name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist
          # Extract version from git tag, or use "dev" for non-tag builds
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          if [ "${{ github.ref_type }}" != "tag" ]; then VERSION="dev"; fi

          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          BINARY="flotio-${{ matrix.os }}-${{ matrix.arch }}${ext}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
            go build -ldflags "-X github.com/flotio-dev/cli/cmd.version=${VERSION}" \
            -o "dist/${BINARY}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flotio-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
